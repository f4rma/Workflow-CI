name: MLflow Model Training CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install mlflow==2.9.2
          pip install scikit-learn pandas numpy
          pip install docker
      
      - name: Run MLflow Training
        run: |
          cd MLProject
          python modelling.py heart-disease_preprocessing.csv 100 42 0.2
      
      - name: Get latest run ID
        id: get_run_id
        run: |
          cd MLProject
          RUN_ID=$(python -c "import mlflow; client = mlflow.tracking.MlflowClient('./mlruns'); experiment = client.get_experiment_by_name('heart-disease-basic'); runs = client.search_runs(experiment.experiment_id, order_by=['start_time DESC'], max_results=1); print(runs[0].info.run_id if runs else '')")
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Latest Run ID: $RUN_ID"
      
      - name: Archive MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/
          retention-days: 30
      
      - name: Commit and push mlruns to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add MLProject/mlruns/
          git diff --staged --quiet || git commit -m "Update MLflow training artifacts [skip ci]"
          git push
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Setup Docker for MLflow
        run: |
          # Ensure Docker daemon is accessible
          docker info
          # Install docker Python package
          pip install docker
      
      - name: Build Docker Image with MLflow
        run: |
          cd MLProject
          RUN_ID="${{ steps.get_run_id.outputs.run_id }}"
          MODEL_URI="runs:/$RUN_ID/model"
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model:latest"
          
          echo "Building Docker image for model: $MODEL_URI"
          mlflow models build-docker -m "$MODEL_URI" -n "$IMAGE_NAME" --enable-mlserver
          
          echo "Pushing image to Docker Hub..."
          docker push "$IMAGE_NAME"
          
          echo "Docker image pushed successfully: $IMAGE_NAME"
      
      - name: Save Docker Hub link
        run: |
          cd MLProject
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model:latest"
          echo "Docker Hub Image: https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model" > docker_hub_link.txt
          echo "Image Tag: $IMAGE_NAME" >> docker_hub_link.txt
          echo "Build Date: $(date)" >> docker_hub_link.txt
          cat docker_hub_link.txt
      
      - name: Commit Docker Hub link
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add MLProject/docker_hub_link.txt
          git diff --staged --quiet || git commit -m "Add Docker Hub link [skip ci]"
          git push
