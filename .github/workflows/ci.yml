name: MLflow Model Training CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn docker joblib
      
      - name: Run MLflow Project
        working-directory: MLProject
        env:
          MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/MLProject/mlruns"
        run: |
          echo "Starting MLflow Project run..."
          echo "Working directory: $(pwd)"
          
          mlflow run . --env-manager=local \
            --experiment-name "heart-disease-basic" \
            -P data_path=heart-disease_preprocessing.csv \
            -P n_estimators=100 \
            -P random_state=42 \
            -P test_size=0.2
          
          echo "MLflow Project run completed successfully"
      
      - name: Get latest run ID
        id: get_run_id
        run: |
          set -euo pipefail
          MLROOT="${GITHUB_WORKSPACE}/MLProject/mlruns"
          echo "Looking for mlruns in: $MLROOT"
          
          if [ ! -d "$MLROOT" ]; then
            echo "ERROR: mlruns directory not found"
            exit 1
          fi
          
          # Find latest meta.yaml by modification time
          LATEST_META=$(find "$MLROOT" -type f -name "meta.yaml" -printf '%T@ %p\n' | sort -k1,1nr | head -n1 | awk '{print $2}')
          
          if [ -z "$LATEST_META" ]; then
            echo "ERROR: No MLflow meta.yaml found"
            exit 1
          fi
          
          RUN_DIR=$(dirname "$LATEST_META")
          RUN_ID=$(basename "$RUN_DIR")
          EXP_DIR=$(dirname "$RUN_DIR")
          EXP_ID=$(basename "$EXP_DIR")
          
          echo "RUN_DIR=$RUN_DIR" >> $GITHUB_ENV
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "EXP_ID=$EXP_ID" >> $GITHUB_ENV
          
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Latest MLflow run: experiment=$EXP_ID, run=$RUN_ID"
      
      - name: Archive MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/
          retention-days: 30
      
      - name: Verify mlruns folder
        run: |
          cd MLProject
          if [ -d "mlruns" ]; then
            echo "✅ mlruns folder exists"
            ls -la mlruns/
          else
            echo "❌ ERROR: mlruns folder not found"
            exit 1
          fi
      
      - name: Commit and push mlruns to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add MLProject/mlruns/
          git diff --staged --quiet || git commit -m "Update MLflow training artifacts [skip ci]"
          git push
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Setup Docker Environment for MLflow
        run: |
          # Set DOCKER_HOST to use unix socket directly
          echo "DOCKER_HOST=unix:///var/run/docker.sock" >> $GITHUB_ENV
          
          # Verify Docker is accessible
          docker info
          docker version
          
          # Test Docker build capability
          echo "FROM python:3.12-slim" > Dockerfile.test
          docker build -f Dockerfile.test -t test-image .
          docker rmi test-image
          rm Dockerfile.test
          
          echo "Docker setup complete"
      
      - name: Build Docker Image with MLflow
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          echo "Building Docker image from artifact path..."
          ART="${{ env.RUN_DIR }}/artifacts/model"
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model"
          
          echo "Artifact path: $ART"
          echo "Image name: $IMAGE_NAME"
          
          # Build Docker image using artifact path directly
          mlflow models build-docker -m "$ART" -n "$IMAGE_NAME"
          
          echo "Tagging image as latest..."
          docker tag "$IMAGE_NAME" "$IMAGE_NAME:latest"
          
          echo "Pushing image to Docker Hub..."
          docker push "$IMAGE_NAME:latest"
          
          echo "Docker image pushed successfully: $IMAGE_NAME:latest"
      
      - name: Save Docker Hub link
        run: |
          cd MLProject
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model:latest"
          echo "Docker Hub Image: https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model" > docker_hub_link.txt
          echo "Image Tag: $IMAGE_NAME" >> docker_hub_link.txt
          echo "Build Date: $(date)" >> docker_hub_link.txt
          cat docker_hub_link.txt
      
      - name: Commit Docker Hub link
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add MLProject/docker_hub_link.txt
          git diff --staged --quiet || git commit -m "Add Docker Hub link [skip ci]"
          git push
