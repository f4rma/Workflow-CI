name: MLflow Model Training CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
      
      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0
          pip install scikit-learn pandas numpy
          pip install 'docker<7.0.0'
      
      - name: Run MLflow Project
        run: |
          cd MLProject
          python modelling.py \
            heart-disease_preprocessing.csv \
            100 \
            42 \
            0.2
      
      - name: Get latest run ID
        id: get_run_id
        run: |
          cd MLProject
          # Wait a bit for mlflow to finalize
          sleep 5
          
          # Get the latest run ID with better error handling
          RUN_ID=$(python -c "
          import mlflow
          import os
          
          mlruns_path = './mlruns'
          if not os.path.exists(mlruns_path):
              print('ERROR: mlruns folder not found')
              exit(1)
          
          try:
              client = mlflow.tracking.MlflowClient(mlruns_path)
              experiment = client.get_experiment_by_name('heart-disease-basic')
              
              if experiment is None:
                  print('ERROR: Experiment not found')
                  exit(1)
              
              runs = client.search_runs(
                  experiment.experiment_id,
                  order_by=['start_time DESC'],
                  max_results=1
              )
              
              if len(runs) == 0:
                  print('ERROR: No runs found')
                  exit(1)
              
              print(runs[0].info.run_id)
          except Exception as e:
              print(f'ERROR: {str(e)}')
              exit(1)
          " 2>&1)
          
          if [[ $RUN_ID == ERROR* ]]; then
            echo "Failed to get run ID: $RUN_ID"
            exit 1
          fi
          
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Latest Run ID: $RUN_ID"
      
      - name: Archive MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/
          retention-days: 30
      
      - name: Verify mlruns folder
        run: |
          cd MLProject
          if [ -d "mlruns" ]; then
            echo "✅ mlruns folder exists"
            echo "Contents:"
            ls -la mlruns/
            
            # Check if there are any experiment folders
            if [ "$(ls -A mlruns/)" ]; then
              echo "✅ mlruns folder is not empty"
            else
              echo "⚠️ WARNING: mlruns folder is empty"
            fi
          else
            echo "❌ ERROR: mlruns folder not found"
            exit 1
          fi
      
      - name: Commit and push mlruns to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add MLProject/mlruns/
          git diff --staged --quiet || git commit -m "Update MLflow training artifacts [skip ci]"
          git push
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Setup Docker Environment for MLflow
        run: |
          # Set DOCKER_HOST to use unix socket directly
          echo "DOCKER_HOST=unix:///var/run/docker.sock" >> $GITHUB_ENV
          
          # Verify Docker is accessible
          docker info
          docker version
          
          # Test Docker build capability
          echo "FROM python:3.12-slim" > Dockerfile.test
          docker build -f Dockerfile.test -t test-image .
          docker rmi test-image
          rm Dockerfile.test
          
          echo "Docker setup complete"
      
      - name: Build Docker Image with MLflow
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          cd MLProject
          RUN_ID="${{ steps.get_run_id.outputs.run_id }}"
          MODEL_URI="runs:/$RUN_ID/model"
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model:latest"
          
          echo "Building Docker image for model: $MODEL_URI"
          echo "Using DOCKER_HOST: $DOCKER_HOST"
          
          # Use mlflow build-docker with explicit DOCKER_HOST
          mlflow models build-docker -m "$MODEL_URI" -n "$IMAGE_NAME"
          
          echo "Pushing image to Docker Hub..."
          docker push "$IMAGE_NAME"
          
          echo "Docker image pushed successfully: $IMAGE_NAME"
      
      - name: Save Docker Hub link
        run: |
          cd MLProject
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model:latest"
          echo "Docker Hub Image: https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model" > docker_hub_link.txt
          echo "Image Tag: $IMAGE_NAME" >> docker_hub_link.txt
          echo "Build Date: $(date)" >> docker_hub_link.txt
          cat docker_hub_link.txt
      
      - name: Commit Docker Hub link
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add MLProject/docker_hub_link.txt
          git diff --staged --quiet || git commit -m "Add Docker Hub link [skip ci]"
          git push
